<div class="exercise-container">

    <div class="text-center mb-4">

        <h5 class="text-magenta fw-bold">
            Suma de Números en una Cadena
        </h5>

        <p class="text-muted">
            Ingrese un texto que contenga números
        </p>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Cadena de texto
        </label>

        <input
            type="text"
            id="cadena18"
            class="form-control"
            placeholder="Ej: Pistón54mza8"
            onkeypress="handleEnter(event,18)">

    </div>

    <div class="text-center">

        <button
            class="btn btn-primary"
            onclick="ejecutarEjercicio(18)">

            Analizar Cadena

        </button>

    </div>

    <div
        id="res18"
        class="resultado-card mt-4">

        <span class="text-muted">
            El resultado aparecerá aquí...
        </span>

    </div>

    <div class="d-flex justify-content-end mt-4">

        <button
            class="btn btn-limpiar"
            onclick="limpiarEjercicio(18)"><i class="bi bi-trash"></i>

        </button>

    </div>

</div>
