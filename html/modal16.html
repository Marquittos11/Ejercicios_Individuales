<div class="text-center mb-3">

    <h5 class="fw-bold text-magenta">
        🔢 Conversión Decimal → Binario

    <p class="text-muted">

    </p>

</div>

<div class="formula-box text-center mb-3">

    <strong>
        División sucesiva entre 2
    </strong>

</div>

<div class="mb-3">

    <button class="btn btn-primary" onclick="ejecutarEjercicio(16)">

        🗑 Limpiar

    </button>

</div>

<div id="res16" class="mt-4 p-3 bg-light border rounded" style="min-height:80px">

    <em>El resultado se mostrará aquí...</em>
