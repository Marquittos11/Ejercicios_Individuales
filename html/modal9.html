<div class="exercise-container">

    <div class="text-center mb-4">

        <h6 class="text-magenta fw-bold">
            Estado del Vuelo
        </h6>

        <p class="text-muted">
            Despegue (10 min) + Vuelo Estable (n) + Aterrizaje (15 seg)
        </p>

    </div>

    <div class="row">

        <div class="col-md-6 mb-3">

            <label class="form-label">
                Tiempo de vuelo estable (n)
            </label>

            <input
                type="number"
                id="tVuelo"
                class="form-control"
                placeholder="Ej: 120"
                min="1"
                onkeydown="soloPositivos(event)"
                onkeypress="siguienteCampo(event,'tActual')">

        </div>

        <div class="col-md-6 mb-3">

            <label class="form-label">
                Tiempo actual (t)
            </label>

            <input
                type="number"
                id="tActual"
                class="form-control"
                placeholder="Ej: 50"
                min="0"
                onkeydown="soloPositivos(event)"
                onkeypress="siguienteCampo(event,'btnCalcular9')">

        </div>

    </div>

    <button
        id="btnCalcular9"
        class="btn btn-primary px-4 py-2"
        onclick="ejecutarEjercicio(9)">
        Consultar Vuelo
    </button>

    <div
        id="res9"
        class="resultado-card mt-4">

        <span class="text-muted">
            El resultado aparecerá aquí...
        </span>

    </div>

    <div class="mt-4">

        <canvas id="graficaVuelo"></canvas>

    </div>

    <div class="d-flex justify-content-end mt-4">

        <button
            class="btn btn-limpiar"
            onclick="limpiarEjercicio(9)">
            Limpiar
        </button>

    </div>

</div>
