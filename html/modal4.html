<div class="exercise-container">

    <div class="mb-4">

        <label class="form-label">
            Ingrese el número
        </label>

        <input
            type="number"
            id="in4"
            class="form-control"
            placeholder="Ej: 256"
            onkeypress="siguienteCampo(event,'btnCalcular4')">

    </div>

    <button
        id="btnCalcular4"
        class="btn btn-primary px-4 py-2"
        onclick="ejecutarEjercicio(4)">
        Analizar Número
    </button>

    <div
        id="res4"
        class="resultado-card mt-4">

        <span class="text-muted">
            El resultado aparecerá aquí...
        </span>

    </div>

    <div class="d-flex justify-content-end mt-4">

        <button
            class="btn btn-limpiar"
            onclick="limpiarEjercicio(4)"><i class="bi bi-trash"></i>
        </button>

    </div>

</div>
