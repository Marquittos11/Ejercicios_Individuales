<div class="exercise-container">

    <div class="text-center mb-4">

        <h5 class="text-magenta fw-bold">
            Análisis de Matriz Numérica
        </h5>

        <p class="text-muted">
            Ingrese las dimensiones de la matriz
        </p>

    </div>

    <div class="row">

        <div class="col-md-6 mb-3">

            <label class="form-label">
                Número de filas
            </label>

            <input
                type="number"
                id="filas14"
                class="form-control"
                placeholder="Ej: 3">

        </div>

        <div class="col-md-6 mb-3">

            <label class="form-label">
                Número de columnas
            </label>

            <input
                type="number"
                id="cols14"
                class="form-control"
                placeholder="Ej: 4">

        </div>

    </div>

    <button
        class="btn btn-primary"
        onclick="generarMatriz14()">

        Generar Matriz

    </button>

    <div
        id="contenedorMatriz14"
        class="mt-4">
    </div>

    <div
        id="res14"
        class="resultado-card mt-4">

        <span class="text-muted">
            El resultado aparecerá aquí...
        </span>

    </div>

    <div class="d-flex justify-content-end mt-4">

        <button
            class="btn btn-limpiar"
            onclick="limpiarEjercicio(14)">

            Limpiar

        </button>

    </div>

</div>
