<div class="exercise-container">

   <div class="card border-0 shadow-sm mb-4">

    <div class="card-body text-center">

        <h6 class="text-magenta fw-bold mb-3">
            Fórmulas
        </h6>

        <p class="mb-2">
            <strong>Perímetro = A + B + C</strong>
        </p>

        <p class="mb-2">
            <strong>Área = √(p(p-A)(p-B)(p-C))</strong>
        </p>

        <p class="mb-0">
            <strong>p = (A+B+C)/2</strong>
        </p>

    </div>

</div>

    <div class="row">

        <div class="col-md-4 mb-3">
            <label class="form-label">
                Lado A
            </label>

            <input
                type="number"
                id="lA"
                class="form-control"
                placeholder="Ej: 8"
                min="0"
                onkeypress="siguienteCampo(event,'1B')">
        </div>

        <div class="col-md-4 mb-3">
            <label class="form-label">
                Lado B
            </label>

            <input
                type="number"
                id="lB"
                class="form-control"
                placeholder="Ej: 6"
                min="0"
                onkeypress="siguienteCampo(event,'1C')">
        </div>

        <div class="col-md-4 mb-3">
            <label class="form-label">
                Lado C
            </label>

            <input
                type="number"
                id="lC"
                class="form-control"
                placeholder="Ej: 5"
                min="0"
                onkeypress="siguienteCampo(event,'btnCalcular3')">
        </div>

    </div>

    <button
        id="btnCalcular3"
        class="btn btn-primary px-4 py-2"
        onclick="ejecutarEjercicio(3)">
        Calcular Triángulo
    </button>

    <div
        id="res3"
        class="resultado-card mt-4">

        <span class="text-muted">
            El resultado aparecerá aquí...
        </span>

    </div>

    <div class="mt-4">
        <canvas id="graficaTriangulo"></canvas>
    </div>

    <div class="d-flex justify-content-end mt-4">
        <button
            class="btn btn-limpiar"
            onclick="limpiarEjercicio(3)">
            Limpiar
        </button>
    </div>

</div>
